<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>烏石港衝浪預報</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #0a1628 0%, #0d2744 40%, #0a3d5c 100%);
      min-height: 100vh;
      color: #e8f4f8;
    }

    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }

    header h1 span {
      color: #38bdf8;
    }

    header p {
      margin-top: 0.4rem;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .wave-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 1rem 0 0.5rem;
    }

    .wave-bar span {
      display: inline-block;
      width: 28px;
      height: 5px;
      border-radius: 99px;
      background: #38bdf8;
      opacity: 0.4;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .wave-bar span:nth-child(2) { animation-delay: 0.2s; width: 40px; opacity: 0.7; }
    .wave-bar span:nth-child(3) { animation-delay: 0.4s; width: 22px; opacity: 0.5; }
    .wave-bar span:nth-child(4) { animation-delay: 0.6s; width: 35px; opacity: 0.6; }
    .wave-bar span:nth-child(5) { animation-delay: 0.8s; }

    @keyframes pulse {
      0%, 100% { transform: scaleX(1); opacity: 0.4; }
      50% { transform: scaleX(1.3); opacity: 0.9; }
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin: 0.8rem 1rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .dot-excellent { background: #22d3ee; }
    .dot-good      { background: #4ade80; }
    .dot-fair      { background: #facc15; }
    .dot-poor      { background: #f87171; }

    /* ── Loading / Error ── */
    #status {
      text-align: center;
      padding: 3rem 1rem;
      color: #94a3b8;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(56,189,248,0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 1.3rem 1.4rem;
      backdrop-filter: blur(8px);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 16px 16px 0 0;
    }

    .card.excellent::before { background: #22d3ee; }
    .card.good::before      { background: #4ade80; }
    .card.fair::before      { background: #facc15; }
    .card.poor::before      { background: #f87171; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .card-date .weekday {
      font-size: 0.78rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-date .date {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      margin-top: 0.1rem;
    }

    .rating-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .rating-badge .score {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
    }

    .card.excellent .score { color: #22d3ee; }
    .card.good      .score { color: #4ade80; }
    .card.fair      .score { color: #facc15; }
    .card.poor      .score { color: #f87171; }

    .rating-badge .label {
      font-size: 0.68rem;
      color: #94a3b8;
      letter-spacing: 0.05em;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 0.8rem 0;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem 1rem;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .metric .metric-label {
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .metric .metric-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .metric .metric-value .unit {
      font-size: 0.72rem;
      font-weight: 400;
      color: #94a3b8;
    }

    .weather-icon {
      font-size: 1.4rem;
      margin-bottom: 0.1rem;
    }

    .surf-tip {
      margin-top: 0.9rem;
      padding: 0.55rem 0.8rem;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 0.78rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .wind-arrow {
      display: inline-block;
      font-size: 0.9rem;
    }

    /* today highlight */
    .card.today-card {
      border-color: rgba(56,189,248,0.35);
      background: rgba(56,189,248,0.08);
    }

    .today-tag {
      display: inline-block;
      background: #38bdf8;
      color: #0a1628;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
      margin-left: 6px;
      vertical-align: middle;
    }

    footer {
      text-align: center;
      padding: 0 1rem 2rem;
      font-size: 0.75rem;
      color: #475569;
    }

    footer a { color: #38bdf8; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <h1>烏石港 <span>衝浪預報</span></h1>
  <p>宜蘭縣頭城鎮 ・ 24.66°N 121.87°E</p>
  <div class="wave-bar">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot dot-excellent"></div>極佳</div>
  <div class="legend-item"><div class="legend-dot dot-good"></div>適合</div>
  <div class="legend-item"><div class="legend-dot dot-fair"></div>普通</div>
  <div class="legend-item"><div class="legend-dot dot-poor"></div>不適合</div>
</div>

<div id="status">
  <div class="spinner"></div>
  <p>正在載入海象資料…</p>
</div>

<div class="cards" id="cards" style="display:none"></div>

<footer>
  資料來源：<a href="https://open-meteo.com" target="_blank">Open-Meteo</a>（免費氣象 & 海象 API）・ 每次載入頁面即更新
</footer>

<script>
// ── 烏石港座標 ──
const LAT = 24.66;
const LON = 121.87;

// 烏石港主要面向東北，離岸風為西南偏西方向
const OFFSHORE_DIR = 225; // 西南，離岸最佳
const ONSHORE_DIR  = 45;  // 東北，正面打浪方向

const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];
const MONTHS   = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// WMO 天氣代碼
const WMO = {
  0:'晴天', 1:'大致晴', 2:'局部多雲', 3:'陰天',
  45:'霧', 48:'霧淞',
  51:'毛毛雨', 53:'毛毛雨', 55:'毛毛雨',
  61:'小雨', 63:'中雨', 65:'大雨',
  71:'小雪', 73:'中雪', 75:'大雪',
  80:'陣雨', 81:'陣雨', 82:'暴雨',
  95:'雷陣雨', 96:'雷雨夾冰雹', 99:'強雷雨夾冰雹',
};

const WMO_ICON = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️',
};

function wmoLabel(code) {
  const c = parseInt(code);
  return WMO[c] || '未知';
}
function wmoIcon(code) {
  const c = parseInt(code);
  return WMO_ICON[c] || '🌡️';
}

// 角度差（-180~180）
function angleDiff(a, b) {
  let d = ((a - b) % 360 + 540) % 360 - 180;
  return Math.abs(d);
}

// 風向箭頭（風「吹向」的方向）
function windArrow(deg) {
  const dirs = ['↓','↙','←','↖','↑','↗','→','↘'];
  return dirs[Math.round(((deg + 180) % 360) / 45) % 8];
}

function degToCompass(deg) {
  const dirs = ['北','東北','東','東南','南','西南','西','西北'];
  return dirs[Math.round(deg / 45) % 8];
}

// ── 衝浪評分邏輯 ──
function scoreSurf({ waveHeight, wavePeriod, windSpeed, windDir, precipSum }) {
  let score = 0;
  const notes = [];

  // 波高 (權重最高)
  if      (waveHeight < 0.4)  { score += 0;  notes.push('浪太小'); }
  else if (waveHeight < 0.8)  { score += 15; notes.push('小浪，適合初學'); }
  else if (waveHeight < 1.5)  { score += 30; notes.push('浪高佳'); }
  else if (waveHeight < 2.5)  { score += 25; notes.push('中等浪高'); }
  else if (waveHeight < 3.5)  { score += 15; notes.push('大浪，適合進階者'); }
  else                         { score += 0;  notes.push('浪太大，危險'); }

  // 浪週期
  if      (wavePeriod < 5)  { score += 0;  notes.push('週期短、浪碎'); }
  else if (wavePeriod < 8)  { score += 10; }
  else if (wavePeriod < 12) { score += 20; notes.push('週期佳'); }
  else                       { score += 25; notes.push('長週期湧浪'); }

  // 風速
  if      (windSpeed < 10) { score += 20; notes.push('微風'); }
  else if (windSpeed < 20) { score += 15; }
  else if (windSpeed < 30) { score += 5;  notes.push('風大'); }
  else                      { score += 0;  notes.push('強風，浪面亂'); }

  // 風向（離岸風加分）
  if (windDir !== null) {
    const diffOff = angleDiff(windDir, OFFSHORE_DIR);
    const diffOn  = angleDiff(windDir, ONSHORE_DIR);
    if (diffOff < 45)       { score += 15; notes.push('離岸風佳'); }
    else if (diffOff < 90)  { score += 8;  }
    else if (diffOn < 45)   { score -= 5;  notes.push('正面迎風'); }
  }

  // 降雨
  if (precipSum > 20)      { score -= 10; notes.push('強降雨'); }
  else if (precipSum > 5)  { score -= 3;  }

  score = Math.max(0, Math.min(100, score));

  let grade, cls;
  if      (score >= 75) { grade = '極佳'; cls = 'excellent'; }
  else if (score >= 55) { grade = '適合'; cls = 'good'; }
  else if (score >= 35) { grade = '普通'; cls = 'fair'; }
  else                   { grade = '不適合'; cls = 'poor'; }

  return { score, grade, cls, notes };
}

// ── API 呼叫 ──
async function fetchData() {
  const marineURL = `https://marine-api.open-meteo.com/v1/marine?latitude=${LAT}&longitude=${LON}` +
    `&daily=wave_height_max,wave_period_max,wave_direction_dominant,swell_wave_height_max,swell_wave_period_max` +
    `&timezone=Asia%2FTaipei&forecast_days=7`;

  const weatherURL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
    `&daily=weather_code,wind_speed_10m_max,wind_direction_10m_dominant,precipitation_sum` +
    `&timezone=Asia%2FTaipei&forecast_days=7`;

  const [marineRes, weatherRes] = await Promise.all([
    fetch(marineURL),
    fetch(weatherURL),
  ]);

  if (!marineRes.ok || !weatherRes.ok) throw new Error('API 請求失敗');

  const [marine, weather] = await Promise.all([marineRes.json(), weatherRes.json()]);
  return { marine, weather };
}

function renderCards({ marine, weather }) {
  const dates       = marine.daily.time;
  const waveHeights = marine.daily.wave_height_max;
  const wavePeriods = marine.daily.wave_period_max;
  const waveDirs    = marine.daily.wave_direction_dominant;
  const swellH      = marine.daily.swell_wave_height_max;
  const swellP      = marine.daily.swell_wave_period_max;

  const weatherCodes = weather.daily.weather_code;
  const windSpeeds   = weather.daily.wind_speed_10m_max;
  const windDirs     = weather.daily.wind_direction_10m_dominant;
  const precips      = weather.daily.precipitation_sum;

  const today = new Date().toISOString().slice(0, 10);
  const container = document.getElementById('cards');
  container.innerHTML = '';

  dates.forEach((dateStr, i) => {
    const d = new Date(dateStr + 'T00:00:00');
    const isToday = dateStr === today;

    const waveHeight = waveHeights[i] ?? 0;
    const wavePeriod = wavePeriods[i] ?? 0;
    const windSpeed  = windSpeeds[i]  ?? 0;
    const windDir    = windDirs[i]    ?? null;
    const waveDir    = waveDirs[i]    ?? null;
    const precipSum  = precips[i]     ?? 0;
    const code       = weatherCodes[i] ?? 0;

    const { score, grade, cls, notes } = scoreSurf({ waveHeight, wavePeriod, windSpeed, windDir, precipSum });

    const weekday = `星期${WEEKDAYS[d.getDay()]}`;
    const dateLabel = `${MONTHS[d.getMonth()]}${d.getDate()}日`;

    const tipText = notes.slice(0, 3).join('・');

    const card = document.createElement('div');
    card.className = `card ${cls}${isToday ? ' today-card' : ''}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-date">
          <div class="weekday">${weekday}${isToday ? '<span class="today-tag">今天</span>' : ''}</div>
          <div class="date">${dateLabel}</div>
        </div>
        <div class="rating-badge">
          <div class="score">${score}</div>
          <div class="label">${grade}</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">波高</div>
          <div class="metric-value">${waveHeight.toFixed(1)} <span class="unit">m</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">浪週期</div>
          <div class="metric-value">${wavePeriod.toFixed(0)} <span class="unit">秒</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">風速</div>
          <div class="metric-value">
            <span class="wind-arrow">${windArrow(windDir ?? 0)}</span>
            ${windSpeed.toFixed(0)} <span class="unit">km/h</span>
          </div>
        </div>
        <div class="metric">
          <div class="metric-label">風向</div>
          <div class="metric-value">${windDir !== null ? degToCompass(windDir) : '--'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">浪向</div>
          <div class="metric-value">${waveDir !== null ? degToCompass(waveDir) : '--'}</div>
        </div>
        <div class="metric">
          <div class="metric-label">天氣</div>
          <div class="metric-value">
            <span>${wmoIcon(code)}</span>
            <span style="font-size:0.8rem">${wmoLabel(code)}</span>
          </div>
        </div>
        ${swellH[i] != null ? `
        <div class="metric">
          <div class="metric-label">湧浪高</div>
          <div class="metric-value">${(swellH[i]).toFixed(1)} <span class="unit">m</span></div>
        </div>` : ''}
        ${swellP[i] != null ? `
        <div class="metric">
          <div class="metric-label">湧浪週期</div>
          <div class="metric-value">${(swellP[i]).toFixed(0)} <span class="unit">秒</span></div>
        </div>` : ''}
      </div>

      ${tipText ? `<div class="surf-tip">${tipText}</div>` : ''}
    `;
    container.appendChild(card);
  });

  document.getElementById('status').style.display = 'none';
  container.style.display = 'grid';
}

async function init() {
  try {
    const data = await fetchData();
    renderCards(data);
  } catch (err) {
    document.getElementById('status').innerHTML = `
      <p style="color:#f87171;font-size:1rem;">⚠️ 無法載入資料</p>
      <p style="color:#64748b;margin-top:0.5rem;font-size:0.85rem;">${err.message}</p>
      <button onclick="location.reload()" style="
        margin-top:1rem; padding:0.5rem 1.2rem;
        background:#38bdf8; color:#0a1628;
        border:none; border-radius:8px; cursor:pointer; font-size:0.9rem; font-weight:600;
      ">重新載入</button>
    `;
  }
}

init();
</script>
</body>
</html>
